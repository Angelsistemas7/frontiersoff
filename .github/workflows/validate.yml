name: Validar pool de proxies (runner efimero)

# Corre el ciclo de fetch + validacion (incluye el detector de maliciosos y
# el reporte a AbuseIPDB) en una maquina efimera de GitHub, no en la red de
# casa. Cada corrida usa una IP de salida distinta, propiedad de GitHub, asi
# que ningun proxy malicioso que probemos puede loguear ni rastrear la IP
# real del dueño de este repo. El runner termina solo al final; no queda
# nada corriendo entre corridas.
#
# Requiere estos secrets en Settings > Secrets and variables > Actions:
#   DB_CONN            (obligatorio) URI de un Redis gratis externo, ej.
#                       Upstash: rediss://default:TOKEN@host.upstash.io:PORT/0
#   ABUSEIPDB_API_KEY   (opcional) misma key que usas localmente, para que
#                       el reporte automatico de maliciosos siga funcionando
#                       tambien desde acá.

on:
  schedule:
    # repo publico = minutos de Actions ilimitados y gratis, asi que se
    # puede correr seguido sin preocuparse por el limite de 2000 min/mes
    # que aplicaria en un repo privado. Cada 15 min, la mas frecuente que
    # GitHub permite en cron de Actions (no admite menos de "*/5" y con
    # menos de 15 el retraso real de arranque del runner se nota mucho).
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Fetch + validar (un solo ciclo, termina solo)
        env:
          DB_CONN: ${{ secrets.DB_CONN }}
          ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIPDB_API_KEY }}
        run: python proxyPool.py once
